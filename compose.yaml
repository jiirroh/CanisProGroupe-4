services:
    db:
        image: mysql:8.0
        container_name: canispro_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: canispro_bdd
            MYSQL_USER: canispro
            MYSQL_PASSWORD: Trasio2026.
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 5

    web:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: canispro_web
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html:cached
        depends_on:
            db:
                condition: service_healthy

    phpmyadmin:
        image: phpmyadmin
        container_name: canispro_phpmyadmin
        ports:
            - "8080:80"
        environment:
            - PMA_HOST=db
            - PMA_USER=canispro
            - PMA_PASSWORD=Trasio2026.
        depends_on:
            - db

volumes:
    db_data: