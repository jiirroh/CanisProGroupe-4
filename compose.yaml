services:
    db:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: canispro_bdd
            MYSQL_USER: canispro
            MYSQL_PASSWORD: Trasio2026.
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql

    web:
        build: .
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html
        depends_on:
            - db

    phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
        - 8080:80
    environment:
        - PMA_HOST=db
        - PMA_USER=canispro
        - PMA_PASSWORD=Trasio2026.
        - PMA_ARBITRARY=1

volumes:
    db_data:
