version: '3.8'

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: canispro_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canispro_bdd
      MYSQL_USER: canispro
      MYSQL_PASSWORD: canispro123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - canispro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

networks:
  canispro_network:
    driver: bridge
