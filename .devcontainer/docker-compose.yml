version: "3.8"


services:
    app:
        build:
            context: .
            dockerfile: .devcontainer/Dockerfile
        volumes:
            - ../..:/workspaces:cached
        working_dir: /workspaces/${localWorkspaceFolderBasename}
        command: sleep infinity
        depends_on:
            db:
                condition: service_healthy
        networks:
            - canispro_network


    db:
        image: mysql:8.0
        container_name: canispro_mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: canispro_bdd
            MYSQL_USER: canispro
            MYSQL_PASSWORD: Trasio2026.
        ports:
            - "3306:3306"
        volumes:
            - database_data:/var/lib/mysql:rw
        networks:
            - canispro_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 30s


volumes:
    database_data:


networks:
    canispro_network:
        driver: bridge

