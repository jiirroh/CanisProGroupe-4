version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    working_dir: /workspaces/${localWorkspaceFolderBasename}
    command: sleep infinity
    environment:
      - DATABASE_URL=mysql://canispro:canispro123@database:3306/canispro_bdd?serverVersion=8.0&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy
    networks:
      - canispro_network

  database:
    image: mysql:8.0
    container_name: canispro_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canispro_bdd
      MYSQL_USER: canispro
      MYSQL_PASSWORD: canispro123
    ports:
      - "3306:3306"
    volumes:
      - database_data:/var/lib/mysql:rw
    networks:
      - canispro_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  database_data:

networks:
  canispro_network:
    driver: bridge